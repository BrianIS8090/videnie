name: Deploy to Pi5

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, pi5]
    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить зависимости
        run: npm ci

      - name: Собрать проект
        run: npm run build

      - name: Деплой в Nginx
        run: |
          sudo rm -rf /var/www/videnie/*
          sudo cp -r dist/* /var/www/videnie/
          echo "Деплой завершён: $(date)"
